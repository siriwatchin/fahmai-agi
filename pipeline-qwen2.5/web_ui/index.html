<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FahMai Agent Chat</title>
  <style>
    :root {
      --bg: #0b0d10;
      --bg-2: #11151b;
      --panel: #1d2026;
      --panel-2: #24272d;
      --line: #30343d;
      --line-2: #424651;
      --text: #f3f4f6;
      --muted: #a6abb4;
      --soft: #d7dbe1;
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --good: #54d38a;
      --warn: #f0bd64;
      --bad: #ff7272;
      --shadow: 0 24px 70px rgba(0, 0, 0, .36);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background:
        radial-gradient(ellipse at 50% 62%, rgba(28, 51, 118, .52), transparent 42%),
        radial-gradient(circle at 48% 45%, rgba(31, 36, 54, .52), transparent 38%),
        linear-gradient(180deg, #101114 0%, #090a0c 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      background: transparent;
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
    }

    .rail {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: start;
      padding: 18px 12px;
      background: rgba(9, 10, 12, .36);
      backdrop-filter: blur(18px);
      border-right: 1px solid rgba(255, 255, 255, .04);
      z-index: 4;
    }

    .logo {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-weight: 800;
      background: linear-gradient(135deg, #34d399, #60a5fa, #a78bfa);
      color: #081014;
      box-shadow: 0 0 30px rgba(96, 165, 250, .28);
    }

    .rail-actions {
      display: grid;
      gap: 10px;
      margin-top: 28px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--soft);
      background: rgba(255, 255, 255, .055);
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, .1);
    }

    .rail-bottom {
      display: grid;
      gap: 10px;
    }

    .main {
      min-width: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      position: relative;
    }

    .topbar {
      height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 clamp(18px, 3vw, 34px);
      color: var(--muted);
      z-index: 3;
    }

    .brand-text {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 14px;
    }

    .spark {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: conic-gradient(from 180deg, #7dd3fc, #a78bfa, #54d38a, #7dd3fc);
      filter: saturate(1.3);
      box-shadow: 0 0 24px rgba(125, 211, 252, .36);
      flex: 0 0 auto;
    }

    .health {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 999px;
      background: rgba(255, 255, 255, .045);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 3px rgba(240, 189, 100, .12);
    }

    .dot.ok {
      background: var(--good);
      box-shadow: 0 0 0 3px rgba(84, 211, 138, .12);
    }

    .dot.bad {
      background: var(--bad);
      box-shadow: 0 0 0 3px rgba(255, 114, 114, .12);
    }

    .stage {
      min-height: 0;
      overflow: auto;
      scroll-behavior: smooth;
      padding: 0 18px 170px;
    }

    .center {
      min-height: calc(100vh - 66px);
      display: grid;
      place-items: center;
      padding-bottom: 9vh;
    }

    .hero {
      width: min(900px, calc(100vw - 132px));
      display: grid;
      justify-items: center;
      gap: 24px;
      text-align: center;
      transform: translateY(-18px);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(34px, 4.5vw, 58px);
      line-height: 1.08;
      font-weight: 440;
      color: rgba(245, 247, 251, .92);
      letter-spacing: 0;
    }

    .prompt-card {
      width: min(760px, 100%);
      min-height: 76px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px 10px 18px;
      border-radius: 999px;
      background: rgba(35, 37, 43, .96);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, .07);
    }

    .plus {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--soft);
      font-size: 30px;
      font-weight: 200;
    }

    .plus:hover {
      background: rgba(255, 255, 255, .075);
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 150px;
      padding: 12px 4px;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      color: var(--text);
      line-height: 1.5;
      font-size: 18px;
      overflow: auto;
    }

    textarea::placeholder {
      color: rgba(227, 231, 236, .58);
    }

    .send {
      min-width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #071114;
      background: #e8eef5;
      font-size: 20px;
      font-weight: 800;
    }

    .send:hover {
      filter: brightness(1.06);
    }

    .send:disabled {
      cursor: not-allowed;
      opacity: .46;
    }

    .chips {
      width: min(760px, 100%);
      display: flex;
      justify-content: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .chip {
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .04);
      color: rgba(231, 235, 241, .74);
      font-size: 13px;
    }

    .chip:hover {
      background: rgba(255, 255, 255, .08);
      color: var(--text);
    }

    .thread {
      width: min(900px, calc(100vw - 132px));
      margin: 0 auto;
      padding: 20px 0 0;
      display: grid;
      gap: 18px;
    }

    .message {
      display: grid;
      gap: 8px;
    }

    .message.user {
      justify-items: end;
    }

    .bubble {
      max-width: min(760px, 100%);
      padding: 14px 18px;
      border-radius: 22px;
      line-height: 1.72;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
    }

    .message.user .bubble {
      background: #2f333b;
      color: var(--text);
      border-bottom-right-radius: 6px;
    }

    .message.assistant .bubble {
      background: transparent;
      color: rgba(245, 247, 251, .94);
      padding-left: 0;
      border-radius: 0;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .meta span {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 999px;
      color: rgba(213, 218, 226, .68);
      background: rgba(255, 255, 255, .035);
      font-size: 12px;
    }

    details.debug {
      width: min(760px, 100%);
      margin-top: 12px;
    }

    details.debug summary {
      width: fit-content;
      cursor: pointer;
      color: rgba(213, 218, 226, .7);
      font-size: 13px;
      list-style-position: inside;
    }

    .debug-wrap {
      display: grid;
      gap: 9px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .035);
    }

    .debug-title {
      color: rgba(245, 247, 251, .86);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 2px;
    }

    .debug-item,
    pre {
      margin: 0;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, .16);
      color: rgba(222, 227, 235, .72);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      max-height: 300px;
    }

    .composer {
      position: fixed;
      left: 72px;
      right: 0;
      bottom: 0;
      padding: 18px 18px 22px;
      background: linear-gradient(180deg, transparent, rgba(9, 10, 12, .88) 26%, rgba(9, 10, 12, .98));
      pointer-events: none;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .18s ease, transform .18s ease;
      z-index: 5;
    }

    body.has-chat .composer {
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .composer .prompt-card {
      margin: 0 auto;
      width: min(820px, calc(100vw - 132px));
      min-height: 66px;
    }

    .composer textarea {
      min-height: 42px;
      font-size: 16px;
    }

    .composer .send {
      min-width: 48px;
      height: 48px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(460px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(35, 37, 43, .96);
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(213, 218, 226, .7);
    }

    .dots {
      display: inline-flex;
      gap: 4px;
    }

    .dots i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    .dots i:nth-child(2) { animation-delay: .14s; }
    .dots i:nth-child(3) { animation-delay: .28s; }

    @keyframes pulse {
      0%, 78%, 100% {
        opacity: .25;
        transform: translateY(0);
      }
      38% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
      }

      .rail {
        display: none;
      }

      .health {
        display: none;
      }

      .stage {
        padding-inline: 14px;
      }

      .hero,
      .thread {
        width: min(900px, calc(100vw - 28px));
      }

      .hero h1 {
        font-size: 34px;
      }

      .composer {
        left: 0;
      }

      .composer .prompt-card,
      .prompt-card {
        width: min(820px, calc(100vw - 28px));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="logo">FM</div>
      <div class="rail-actions">
        <button class="icon-btn" id="newChatBtn" type="button" title="New chat">＋</button>
        <button class="icon-btn" id="healthBtn" type="button" title="Refresh">↻</button>
      </div>
      <div class="rail-bottom">
        <button class="icon-btn" type="button" title="FahMai">F</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="brand-text">
          <span class="spark"></span>
          <span>FahMai Agent Chat</span>
        </div>
        <div class="health" id="healthPills">
          <span class="pill"><span class="dot"></span><span>checking</span></span>
        </div>
      </header>

      <section class="stage" id="stage">
        <div class="center" id="welcome">
          <div class="hero">
            <h1>What's next, FahMai?</h1>
            <div class="prompt-card">
              <button class="plus" type="button" title="Sample">＋</button>
              <textarea id="heroInput" placeholder="Ask FahMai"></textarea>
              <button class="send" id="heroSend" type="button" title="Send">↑</button>
            </div>
            <div class="chips">
              <button class="chip" type="button">MSRP ของ NT-LT-001 เป็นเท่าไหร่</button>
              <button class="chip" type="button">นโยบาย IP68 ครอบคลุมน้ำเข้าไหม</button>
              <button class="chip" type="button">ใครเป็น CEO วันที่ 1 มิถุนายน 2568</button>
              <button class="chip" type="button">FACT_SHIPPING ใช้ vendor รายใดบ้าง</button>
            </div>
          </div>
        </div>
        <div class="thread" id="thread"></div>
      </section>

      <section class="composer">
        <div class="prompt-card">
          <button class="plus" type="button" title="Sample">＋</button>
          <textarea id="chatInput" placeholder="Ask FahMai"></textarea>
          <button class="send" id="chatSend" type="button" title="Send">↑</button>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const els = {
      body: document.body,
      stage: document.getElementById("stage"),
      welcome: document.getElementById("welcome"),
      thread: document.getElementById("thread"),
      heroInput: document.getElementById("heroInput"),
      chatInput: document.getElementById("chatInput"),
      heroSend: document.getElementById("heroSend"),
      chatSend: document.getElementById("chatSend"),
      newChatBtn: document.getElementById("newChatBtn"),
      healthBtn: document.getElementById("healthBtn"),
      healthPills: document.getElementById("healthPills"),
      toast: document.getElementById("toast")
    };

    const API_ENDPOINT = "api/v2/chat";
    let busy = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function compact(value) {
      if (value === null || value === undefined || value === "") return "-";
      if (typeof value === "number") return Number.isInteger(value) ? String(value) : value.toFixed(3);
      return String(value);
    }

    function apiUrl(path) {
      const clean = String(path || "").replace(/^\/+/, "");
      const base = window.location.pathname.endsWith("/")
        ? window.location.pathname
        : window.location.pathname.replace(/[^/]*$/, "");
      return `${base}${clean}`;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      setTimeout(() => els.toast.classList.remove("show"), 2300);
    }

    function setBusy(next) {
      busy = next;
      els.heroSend.disabled = next;
      els.chatSend.disabled = next;
      els.heroSend.textContent = next ? "…" : "↑";
      els.chatSend.textContent = next ? "…" : "↑";
    }

    function scrollBottom() {
      requestAnimationFrame(() => {
        els.stage.scrollTop = els.stage.scrollHeight;
      });
    }

    function setHealth(data, error) {
      if (error) {
        els.healthPills.innerHTML = `<span class="pill"><span class="dot bad"></span><span>api offline</span></span>`;
        return;
      }

      const ok = Boolean(data?.ok);
      const sql = data?.sql_backend ?? "-";
      const qdrant = data?.qdrant_enabled ? "on" : "off";
      els.healthPills.innerHTML = `
        <span class="pill"><span class="dot ${ok ? "ok" : "bad"}"></span><span>${ok ? "ready" : "loading"}</span></span>
        <span class="pill"><span class="dot ${sql === "postgres" ? "ok" : ""}"></span><span>sql: ${escapeHtml(sql)}</span></span>
        <span class="pill"><span class="dot ${data?.qdrant_enabled ? "ok" : ""}"></span><span>qdrant: ${qdrant}</span></span>
      `;
    }

    async function refreshHealth() {
      try {
        const res = await fetch(apiUrl("health"));
        const data = await res.json();
        setHealth(data);
      } catch (err) {
        setHealth(null, err);
      }
    }

    function answerFrom(data) {
      return data?.answer ?? data?.data?.answer ?? "";
    }

    function sourcesFrom(data) {
      return Array.isArray(data?.sources) ? data.sources : [];
    }

    function tokenUsageFrom(data) {
      return data?.token_usage ?? {};
    }

    function toolSummaryFrom(data) {
      return data?.tool_summary ?? {};
    }

    function sourceHtml(items) {
      if (!items.length) return `<div class="debug-item">No sources returned.</div>`;
      return items.slice(0, 10).map((src, index) => {
        const title = src.type || src.source || `source ${index + 1}`;
        const tag = src.backend || src.doc_type || src.query_hash || "";
        const preview = src.preview || src.text || JSON.stringify(src, null, 2);
        return `<div class="debug-item"><b>${escapeHtml(title)}</b> ${escapeHtml(tag)}\n${escapeHtml(preview)}</div>`;
      }).join("");
    }

    function toolHtml(summary, audit) {
      const byTool = summary.by_tool || {};
      const entries = Object.entries(byTool);
      if (entries.length) {
        return entries.map(([name, item]) => (
          `<div class="debug-item"><b>${escapeHtml(name)}</b>\n` +
          `calls=${escapeHtml(item.calls ?? 0)} · ok=${escapeHtml(item.ok_calls ?? 0)} · sec=${escapeHtml(compact(item.seconds))} · tokens≈${escapeHtml(compact(item.total_tokens_estimate))}</div>`
        )).join("");
      }
      if (Array.isArray(audit) && audit.length) {
        return audit.slice(0, 10).map((rec) => (
          `<div class="debug-item"><b>${escapeHtml(rec.tool || "tool")}</b> ${escapeHtml(rec.action || "")}\n` +
          `ok=${escapeHtml(rec.ok)} · sec=${escapeHtml(compact(rec.seconds))} · tokens≈${escapeHtml(compact(rec.total_tokens_estimate))}</div>`
        )).join("");
      }
      return `<div class="debug-item">No tool audit returned.</div>`;
    }

    function addUserMessage(text) {
      const msg = document.createElement("article");
      msg.className = "message user";
      msg.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
      els.thread.appendChild(msg);
      scrollBottom();
    }

    function addThinking() {
      const msg = document.createElement("article");
      msg.className = "message assistant";
      msg.innerHTML = `
        <div class="bubble">
          <span class="thinking">
            <span class="dots"><i></i><i></i><i></i></span>
            ค้นหลักฐานและสร้างคำตอบ
          </span>
        </div>
      `;
      els.thread.appendChild(msg);
      scrollBottom();
      return msg;
    }

    function addAssistantMessage(text, data) {
      const usage = tokenUsageFrom(data || {});
      const summary = toolSummaryFrom(data || {});
      const sources = sourcesFrom(data || {});
      const toolCalls = summary.total_tool_calls ?? data?.tool_audit?.length ?? 0;
      const totalTokens = usage.total_tokens ?? 0;
      const outputTokens = data?.total_output_token ?? usage.total_output_token ?? 0;

      const msg = document.createElement("article");
      msg.className = "message assistant";
      msg.innerHTML = `
        <div class="bubble">
          ${escapeHtml(text)}
          <div class="meta">
            <span>${escapeHtml(compact(data?.request_seconds))} sec</span>
            <span>${escapeHtml(compact(outputTokens))} output tokens</span>
            <span>${escapeHtml(compact(totalTokens))} llm tokens</span>
            <span>${escapeHtml(compact(toolCalls))} tools</span>
            <span>${escapeHtml(sources.length)} sources</span>
            <span>id: ${escapeHtml(data?.id ?? "-")}</span>
          </div>
          <details class="debug">
            <summary>Sources and audit</summary>
            <div class="debug-wrap">
              <div class="debug-title">Sources</div>
              ${sourceHtml(sources)}
              <div class="debug-title">Tools</div>
              ${toolHtml(summary, data?.tool_audit)}
              <div class="debug-title">Raw response</div>
              <pre>${escapeHtml(JSON.stringify(data || {}, null, 2))}</pre>
            </div>
          </details>
        </div>
      `;
      els.thread.appendChild(msg);
      scrollBottom();
    }

    function enterChatMode() {
      if (!els.body.classList.contains("has-chat")) {
        els.body.classList.add("has-chat");
        els.welcome.hidden = true;
      }
    }

    function clearChat() {
      els.thread.innerHTML = "";
      els.body.classList.remove("has-chat");
      els.welcome.hidden = false;
      els.heroInput.value = "";
      els.chatInput.value = "";
      els.heroInput.focus();
    }

    async function ask(question) {
      const text = String(question || "").trim();
      if (!text) {
        showToast("ใส่คำถามก่อน");
        return;
      }
      if (busy) return;

      enterChatMode();
      setBusy(true);
      els.heroInput.value = "";
      els.chatInput.value = "";
      addUserMessage(text);
      const thinking = addThinking();
      const started = performance.now();

      try {
        const res = await fetch(apiUrl(API_ENDPOINT), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data: { question: text } })
        });
        const raw = await res.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          data = { answer: raw, status: res.status };
        }
        if (!res.ok) throw new Error(data.detail || raw || `HTTP ${res.status}`);
        if (!data.request_seconds) data.request_seconds = Number(((performance.now() - started) / 1000).toFixed(3));
        thinking.remove();
        addAssistantMessage(answerFrom(data) || "No answer returned.", data);
        refreshHealth();
      } catch (err) {
        thinking.remove();
        addAssistantMessage(`Error: ${err.message || err}`, {
          request_seconds: Number(((performance.now() - started) / 1000).toFixed(3)),
          tool_summary: { total_tool_calls: 0 }
        });
        showToast("request failed");
      } finally {
        setBusy(false);
        els.chatInput.focus();
      }
    }

    function bindInput(input, button) {
      button.addEventListener("click", () => ask(input.value));
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          ask(input.value);
        }
      });
    }

    document.querySelectorAll(".chip").forEach((btn) => {
      btn.addEventListener("click", () => {
        els.heroInput.value = btn.textContent.trim();
        els.heroInput.focus();
      });
    });

    document.querySelectorAll(".plus").forEach((btn) => {
      btn.addEventListener("click", () => {
        const samples = [
          "MSRP ของสินค้ารหัส NT-LT-001 (NovaTech laptop) เป็นเท่าไหร่ครับ",
          "นโยบายการรับประกัน IP68 ครอบคลุมน้ำเข้าไหม",
          "ใครเป็น CEO ของ FahMai ณ วันที่ 1 มิถุนายน 2568",
          "ในปี 2025 ลูกค้า B2B รายไหนจ่ายเงินช้าที่สุด และ late days เป็นเท่าไหร่"
        ];
        const pick = samples[Math.floor(Math.random() * samples.length)];
        const input = els.body.classList.contains("has-chat") ? els.chatInput : els.heroInput;
        input.value = pick;
        input.focus();
      });
    });

    els.newChatBtn.addEventListener("click", clearChat);
    els.healthBtn.addEventListener("click", refreshHealth);
    bindInput(els.heroInput, els.heroSend);
    bindInput(els.chatInput, els.chatSend);
    refreshHealth();
    els.heroInput.focus();
  </script>
</body>
</html>
